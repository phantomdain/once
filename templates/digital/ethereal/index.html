<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Priya &amp; Arjun — Digital Invitation · Ethereal Template</title>
  <link rel="icon" href="../../../assets/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --eth-bg: #fefefe;
      --eth-text: #1a1a1a;
      --eth-muted: #8a8a8a;
      --eth-border: #e4e4e4;
      --eth-accent: #1a1a1a;
      --font-heading: 'Cormorant Garamond', serif;
      --font-body: 'Inter', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background-color: var(--eth-bg);
      color: var(--eth-text);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    .back {
      position: fixed;
      top: 24px; left: 28px;
      font-size: 0.65rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--eth-muted); text-decoration: none;
      display: flex; align-items: center; gap: 6px;
      transition: color 0.2s; z-index: 10;
    }
    .back:hover { color: var(--eth-text); }
    .back::before { content: '←'; }

    .badge {
      position: fixed;
      top: 24px; right: 28px;
      font-size: 0.6rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--eth-muted);
      background-color: var(--eth-bg);
      border: 1px solid var(--eth-border);
      padding: 6px 14px; border-radius: 2px; z-index: 10;
    }

    .edit-link {
      position: fixed;
      top: 56px; right: 28px;
      font-size: 0.6rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--eth-muted);
      background-color: var(--eth-bg);
      border: 1px solid var(--eth-border);
      padding: 5px 12px; border-radius: 2px;
      text-decoration: none; transition: background-color 0.2s; z-index: 10;
    }
    .edit-link:hover { background-color: var(--eth-border); color: var(--eth-text); }

    .page {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 80px 24px;
    }

    .card {
      max-width: 440px; width: 100%;
      text-align: center;
      animation: fadeIn 1s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      font-size: 0.6rem; font-weight: 400; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--eth-muted); margin-bottom: 40px;
    }

    .rule { width: 1px; height: 40px; background-color: var(--eth-border); margin: 0 auto 40px; }

    .names {
      font-family: var(--font-heading);
      font-size: clamp(3rem, 10vw, 4.2rem);
      font-weight: 300; line-height: 1; letter-spacing: -0.01em;
      color: var(--eth-text); margin-bottom: 12px;
    }
    .names-amp {
      display: block; font-family: var(--font-heading); font-style: italic;
      font-size: 0.38em; font-weight: 300; color: var(--eth-muted);
      letter-spacing: 0.05em; margin: 10px 0;
    }

    .rule-h { width: 32px; height: 1px; background-color: var(--eth-border); margin: 32px auto; }

    .invite-text {
      font-family: var(--font-heading); font-style: italic;
      font-size: 1.05rem; font-weight: 300; color: var(--eth-muted);
      line-height: 1.75; margin-bottom: 40px;
    }

    .details { display: flex; flex-direction: column; gap: 24px; margin-bottom: 40px; }

    .detail-item { display: flex; flex-direction: column; gap: 6px; }

    .detail-label {
      font-size: 0.58rem; font-weight: 500; letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--eth-muted);
    }
    .detail-value {
      font-family: var(--font-heading);
      font-size: 1.1rem; font-weight: 400; color: var(--eth-text); line-height: 1.4;
    }

    .rule-h-full { width: 100%; height: 1px; background-color: var(--eth-border); margin: 0 0 32px; }

    /* venue-link */
    .venue-link {
      color: inherit; text-decoration: underline;
      text-decoration-style: dotted; text-underline-offset: 3px;
      text-decoration-color: var(--eth-border);
    }
    .venue-link:hover { text-decoration-color: var(--eth-text); }

    .rsvp-btn {
      display: inline-block; padding: 13px 36px;
      border: 1px solid var(--eth-text);
      font-family: var(--font-body); font-size: 0.68rem; font-weight: 500;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--eth-text); text-decoration: none;
      transition: background-color 0.2s, color 0.2s;
    }
    .rsvp-btn:hover { background-color: var(--eth-text); color: var(--eth-bg); }

    .footer-note { margin-top: 28px; font-size: 0.7rem; color: var(--eth-muted); line-height: 1.7; }

    .once-credit {
      margin-top: 40px; font-size: 0.58rem;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--eth-border);
    }
    .once-credit a { color: inherit; text-decoration: none; }
    .once-credit a:hover { color: var(--eth-muted); }

    /* QR code block */
    .qr-block { margin-top: 28px; }
    .qr-block-inner {
      display: inline-block; padding: 14px 18px;
      border: 1px solid var(--eth-border);
    }
    .qr-block-label {
      margin-top: 9px;
      font-size: 0.58rem; font-weight: 400; letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--eth-muted);
    }
  </style>
</head>
<body>

  <a href="../../../index.html#templates" class="back">Templates</a>
  <span class="badge">Ethereal · Digital Invite</span>
  <a href="./edit.html" class="edit-link">Edit ✎</a>

  <div class="page">
    <div class="card">

      <p class="eyebrow" id="f-eyebrow">We joyfully invite you</p>

      <div class="rule"></div>

      <h1 class="names">
        <span id="f-partner1">Priya</span>
        <span class="names-amp">&amp;</span>
        <span id="f-partner2">Arjun</span>
      </h1>

      <div class="rule-h"></div>

      <p class="invite-text" id="f-inviteText">
        to share in the joy of their marriage<br>
        and the celebration that follows
      </p>

      <div class="rule-h-full"></div>

      <!-- Details rendered by JS -->
      <div class="details" id="f-details"></div>

      <a id="f-rsvpBtn" href="#rsvp" class="rsvp-btn">RSVP by October 15th</a>

      <!-- QR code — shown only when qrUrl is set -->
      <div id="f-qr" class="qr-block" style="display:none">
        <div class="qr-block-inner">
          <div class="qr-canvas-wrap"></div>
          <p class="qr-block-label">Scan to visit our website</p>
        </div>
      </div>

      <p class="footer-note" id="f-footerNote">
        Dinner &amp; dancing to follow<br>
        Accommodation available on request
      </p>

      <div class="rule" style="margin: 40px auto 0; height: 28px;"></div>

      <p class="once-credit">Designed by <a href="../../../index.html">ONCE</a></p>

    </div>
  </div>

  <script>
    (function() {
      var STORAGE_KEY = 'once-ethereal-override';
      var DEFAULTS = {
        partner1:    'Priya',
        partner2:    'Arjun',
        eyebrow:     'We joyfully invite you',
        inviteText:  'to share in the joy of their marriage\nand the celebration that follows',
        date:        'Saturday, 22nd November 2025',
        ceremony:    'Ceremony at 4:30 PM',
        venueLabel:  'Venue',
        venue:       'The Rambagh Palace\nJaipur, Rajasthan',
        venueMap:    '',
        venue2Label: 'Reception',
        venue2:      '',
        venue2Map:   '',
        dressCode:   'Formal · Indian attire welcome',
        rsvpText:    'RSVP by October 15th',
        rsvpLink:    '#rsvp',
        footerNote:  'Dinner & dancing to follow\nAccommodation available on request',
        qrUrl:       ''
      };
      var stored = localStorage.getItem(STORAGE_KEY);
      var data = stored ? Object.assign({}, DEFAULTS, JSON.parse(stored)) : DEFAULTS;

      function setId(id, val, isHTML) {
        var el = document.getElementById(id);
        if (!el || val === undefined || val === null) return;
        if (isHTML) el.innerHTML = String(val).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
        else el.textContent = String(val);
      }

      function _esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
      function _nl(s)  { return _esc(s).replace(/\n/g,'<br>'); }
      function _vItem(lbl, txt, url) {
        var inner = _nl(txt || '');
        if ((url||'').trim()) {
          inner = '<a href="' + _esc(url.trim()) + '" target="_blank" rel="noopener" class="venue-link">' + inner + '</a>';
        }
        return '<div class="detail-item"><p class="detail-label">' + _esc(lbl||'Venue') + '</p><p class="detail-value">' + inner + '</p></div>';
      }

      // Render details list
      var det = document.getElementById('f-details');
      if (det) {
        var html = '';
        html += '<div class="detail-item"><p class="detail-label">' + _esc(data.date||'') + '</p><p class="detail-value">' + _esc(data.ceremony||'') + '</p></div>';
        html += _vItem(data.venueLabel || 'Venue', data.venue, data.venueMap);
        if ((data.venue2 || '').trim()) {
          html += _vItem(data.venue2Label || 'Reception', data.venue2, data.venue2Map);
        }
        if ((data.dressCode || '').trim()) {
          html += '<div class="detail-item"><p class="detail-label">Dress Code</p><p class="detail-value">' + _esc(data.dressCode) + '</p></div>';
        }
        det.innerHTML = html;
      }

      setId('f-eyebrow',    data.eyebrow);
      setId('f-partner1',   data.partner1);
      setId('f-partner2',   data.partner2);
      setId('f-inviteText', data.inviteText, true);

      var rsvp = document.getElementById('f-rsvpBtn');
      if (rsvp) { rsvp.textContent = data.rsvpText || ''; rsvp.href = data.rsvpLink || '#rsvp'; }

      setId('f-footerNote', data.footerNote, true);

      // QR code
      (function() {
        var url = (data.qrUrl || '').trim();
        var wrap = document.getElementById('f-qr');
        if (!wrap) return;
        if (url) {
          wrap.style.display = '';
          new QRCode(wrap.querySelector('.qr-canvas-wrap'), {
            text: url, width: 128, height: 128,
            colorDark: '#000000', colorLight: '#ffffff'
          });
        } else {
          wrap.style.display = 'none';
        }
      })();

      document.title = (data.partner1 || 'Priya') + ' & ' + (data.partner2 || 'Arjun') + ' — Digital Invitation · Ethereal Template';
    })();
  </script>
</body>
</html>
